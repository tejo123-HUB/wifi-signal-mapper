<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Campus WiFi Signal Mapper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Campus WiFi Signal Mapper</h1>

  <section id="floor-controls">
    <input type="text" id="floor-name" placeholder="New floor name">
    <button id="create-floor-btn">Create floor</button>
    <select id="floor-select"></select>
  </section>

  <section id="room-controls">
    <input type="file" id="room-photo-input" accept="image/*">
    <button id="add-room-btn">Add room photo</button>
    <span class="hint">Drag room photos to position them, or drag the small square at a room's bottom-right corner to resize it.</span>
  </section>

  <section id="controls">
    <label>Smoothing: <input type="range" id="smoothing" min="1" max="4" step="0.5" value="2"></label>
    <button id="take-reading-btn">Take reading at last clicked point</button>
    <span id="status"></span>
  </section>

  <canvas id="canvas" width="1000" height="700"></canvas>

  <script type="module" src="app.js"></script>
</body>
</html>
